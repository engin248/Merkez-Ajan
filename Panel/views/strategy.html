    <!-- ═══ CHAT LOGIC ═══ -->
    <script>
    (function() {
      const chatBtn = document.getElementById('chatBtn');
      const chatPanel = document.getElementById('chatPanel');
      const chatClose = document.getElementById('chatClose');
      const chatNewChat = document.getElementById('chatNewChat');
      const chatInput = document.getElementById('chatInput');
      const chatSend = document.getElementById('chatSend');
      const chatMessages = document.getElementById('chatMessages');
      const chatEmpty = document.getElementById('chatEmpty');
      const chatTyping = document.getElementById('chatTyping');
      const chatModelSelect = document.getElementById('chatModelSelect');
      const chatModelBadge = document.getElementById('chatModelBadge');

      // Yeni ajan seçici elemanları
      const agentSelector = document.getElementById('agentSelector');
      const agentSelectorTrigger = document.getElementById('agentSelectorTrigger');
      const agentDropdown = document.getElementById('agentDropdown');
      const agentDropdownList = document.getElementById('agentDropdownList');
      const agentSearchInput = document.getElementById('agentSearchInput');
      const agentDot = document.getElementById('agentDot');
      const agentName = document.getElementById('agentName');
      const agentMeta = document.getElementById('agentMeta');

      // ── Ajan bazlı sohbet deposu ──
      const CHAT_PREFIX = 'asker_chat_';
      let currentAgentId = 'core';
      let currentMessages = [];
      let isSending = false;

      // Eski tek-geçmiş key'ini temizle (migration)
      localStorage.removeItem('asker_motoru_chat_history');

      function getChatKey(agentId) { return CHAT_PREFIX + (agentId || 'core'); }

      function loadAgentChat(agentId) {
        currentAgentId = agentId;
        try {
          const saved = localStorage.getItem(getChatKey(agentId));
          currentMessages = saved ? JSON.parse(saved) : [];
        } catch(e) { currentMessages = []; }
      }

      function saveAgentChat() {
        try {
          if (currentMessages.length > 100) currentMessages = currentMessages.slice(-100);
          localStorage.setItem(getChatKey(currentAgentId), JSON.stringify(currentMessages));
        } catch(e) {}
      }

      function timeStr() {
        const d = new Date();
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      }

      function getAgentName(agentId) {
        if (typeof NODES !== 'undefined') {
          const node = NODES.find(n => n.id === agentId);
          if (node) return node.label;
        }
        return agentId;
      }

      // ── Ajan bilgilerini al ──
      function getNodeInfo(nodeId) {
        if (typeof NODES === 'undefined') return null;
        return NODES.find(n => n.id === nodeId) || null;
      }

      function getParentName(parentId) {
        const parent = getNodeInfo(parentId);
        return parent ? parent.label : parentId;
      }

      function getRankLabel(node) {
        if (node.id === 'core') return 'KOMUTA';
        if (node.r >= 22) return 'YÖNETİCİ';
        if (node.r >= 18) return 'SİSTEM';
        return 'İŞÇİ';
      }

      function getRankClass(node) {
        if (node.id === 'core') return 'rank-komuta';
        if (node.r >= 22) return 'rank-yonetici';
        if (node.r >= 18) return 'rank-sistem';
        return 'rank-isci';
      }

      // ── Premium ajan listesini oluştur ──
      function buildAgentList(filter) {
        if (typeof NODES === 'undefined') return;
        agentDropdownList.innerHTML = '';
        const q = (filter || '').toLowerCase();

        // Grupla: Komuta → Yöneticiler (+ alt ajanları) → Sistemler
        const core = NODES.find(n => n.id === 'core');
        const managers = NODES.filter(n => n.parent === 'core' && n.r >= 22 && n.model);
        const systems = NODES.filter(n => n.parent === 'core' && n.r >= 18 && !n.model);

        function matchesFilter(node) {
          if (!q) return true;
          return (node.label || '').toLowerCase().includes(q)
              || (node.sub || '').toLowerCase().includes(q)
              || (node.model || '').toLowerCase().includes(q);
        }

        function createAgentItem(node, isChild, parentLabel) {
          const item = document.createElement('button');
          item.className = 'agent-item' + (isChild ? ' agent-item-child' : '') + (node.id === currentAgentId ? ' selected' : '');
          const rank = getRankLabel(node);
          const rankCls = getRankClass(node);
          const modelTag = node.model ? `<span class="agent-item-model">${node.model}</span>` : '';
          const parentTag = isChild && parentLabel ? `<span class="agent-item-parent">↳ ${parentLabel}</span>` : '';

          item.innerHTML = `
            <div class="agent-item-dot" style="background:${node.color};box-shadow:0 0 8px ${node.color}44"></div>
            <div class="agent-item-info">
              <div class="agent-item-top">
                <span class="agent-item-name">${node.label}</span>
                <span class="agent-item-rank ${rankCls}">${rank}</span>
              </div>
              <div class="agent-item-bottom">
                ${node.sub ? `<span class="agent-item-sub">${node.sub}</span>` : ''}
                ${modelTag}
                ${parentTag}
              </div>
            </div>
          `;

          item.addEventListener('click', () => {
            selectAgent(node.id);
            closeAgentDropdown();
          });
          return item;
        }

        // Komuta
        if (core && matchesFilter(core)) {
          const header = document.createElement('div');
          header.className = 'agent-group-header';
          header.textContent = 'KOMUTA BİRİMİ';
          agentDropdownList.appendChild(header);
          agentDropdownList.appendChild(createAgentItem(core, false));
        }

        // Yöneticiler + Alt ajanlar
        let hasManager = false;
        managers.forEach(mgr => {
          const children = NODES.filter(n => n.parent === mgr.id);
          const mgrMatch = matchesFilter(mgr);
          const childMatch = children.some(c => matchesFilter(c));
          if (!mgrMatch && !childMatch) return;

          if (!hasManager) {
            const header = document.createElement('div');
            header.className = 'agent-group-header';
            header.textContent = 'YÖNETİCİ AJANLAR';
            agentDropdownList.appendChild(header);
            hasManager = true;
          }

          if (mgrMatch) {
            agentDropdownList.appendChild(createAgentItem(mgr, false));
          }

          // İşçi ajanlar
          children.forEach(child => {
            if (matchesFilter(child) || (mgrMatch && !q)) {
              agentDropdownList.appendChild(createAgentItem(child, true, mgr.label));
            }
          });
        });

        // Sistem modülleri
        let hasSys = false;
        systems.forEach(sys => {
          const children = NODES.filter(n => n.parent === sys.id);
          const sysMatch = matchesFilter(sys);
          const childMatch = children.some(c => matchesFilter(c));
          if (!sysMatch && !childMatch) return;

          if (!hasSys) {
            const header = document.createElement('div');
            header.className = 'agent-group-header';
            header.textContent = 'SİSTEM MODÜLLERİ';
            agentDropdownList.appendChild(header);
            hasSys = true;
          }

          if (sysMatch) {
            agentDropdownList.appendChild(createAgentItem(sys, false));
          }

          children.forEach(child => {
            if (matchesFilter(child) || (sysMatch && !q)) {
              agentDropdownList.appendChild(createAgentItem(child, true, sys.label));
            }
          });
        });

        // Sonuç yok mesajı
        if (agentDropdownList.children.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'agent-dropdown-empty';
          empty.textContent = 'Sonuç bulunamadı';
          agentDropdownList.appendChild(empty);
        }
      }

      // ── Ajan seç ──
      function selectAgent(agentId) {
        const node = getNodeInfo(agentId);
        if (!node) return;

        // Trigger UI güncelle
        agentDot.style.background = node.color;
        agentDot.style.boxShadow = `0 0 10px ${node.color}66`;
        agentName.textContent = node.label;

        const rank = getRankLabel(node);
        let metaText = rank;
        if (node.sub) metaText += ' · ' + node.sub;
        if (node.parent && node.parent !== 'core') {
          metaText += ' · ↳ ' + getParentName(node.parent);
        }
        agentMeta.textContent = metaText;

        // Badge güncelle
        chatModelBadge.textContent = node.label;

        // Gizli select uyumluluğu
        chatModelSelect.value = agentId;

        // Chat geçişi
        loadAgentChat(agentId);
        renderMessages();
      }

      // ── Dropdown aç/kapa ──
      function openAgentDropdown() {
        agentSelector.classList.add('open');
        agentSearchInput.value = '';
        buildAgentList('');
        setTimeout(() => agentSearchInput.focus(), 50);
      }

      function closeAgentDropdown() {
        agentSelector.classList.remove('open');
      }

      agentSelectorTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (agentSelector.classList.contains('open')) {
          closeAgentDropdown();
        } else {
          openAgentDropdown();
        }
      });

      // Arama
      agentSearchInput.addEventListener('input', () => {
        buildAgentList(agentSearchInput.value);
      });

      // Dışa tıklayınca kapat
      document.addEventListener('click', (e) => {
        if (!agentSelector.contains(e.target)) {
          closeAgentDropdown();
        }
      });

      // ESC ile kapat
      agentSearchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAgentDropdown();
      });

      // ── Eski populate fonksiyonu (uyumluluk) ──
      function populateAgentSelect() {
        const prevVal = chatModelSelect.value;
        chatModelSelect.innerHTML = '';
        if (typeof NODES === 'undefined') return;

        NODES.filter(n => n.model || n.r >= 18 || n.id === 'core').forEach(agent => {
          const opt = document.createElement('option');
          opt.value = agent.id;
          opt.textContent = agent.label;
          chatModelSelect.appendChild(opt);
        });

        if (prevVal && [...chatModelSelect.options].some(o => o.value === prevVal)) {
          chatModelSelect.value = prevVal;
        }
      }

      function getSelectedModel() {
        const agentId = currentAgentId || 'core';
        if (typeof NODES !== 'undefined') {
          const node = NODES.find(n => n.id === agentId);
          if (node && node.model) return node.model;
          // İşçi ajan ise parent'ın modelini kullan
          if (node && node.parent) {
            const parent = NODES.find(n => n.id === node.parent);
            if (parent && parent.model) return parent.model;
          }
        }
        return 'qwen3:8b';
      }

      // ── Mesajları render et ──
      function renderMessages() {
        const existing = chatMessages.querySelectorAll('.chat-msg');
        existing.forEach(el => el.remove());

        if (currentMessages.length === 0) {
          chatEmpty.style.display = 'flex';
          return;
        }
        chatEmpty.style.display = 'none';

        currentMessages.forEach(msg => {
          const div = document.createElement('div');
          div.className = 'chat-msg ' + (msg.role === 'user' ? 'user' : 'agent');
          const senderName = msg.role === 'user' ? 'SEN' : getAgentName(currentAgentId);
          const bubbleContent = msg.role === 'user' ? escapeHtml(msg.content) : msg.content;
          div.innerHTML = `
            <div class="chat-msg-sender">${senderName}</div>
            <div class="chat-msg-bubble">${bubbleContent}</div>
            <div class="chat-msg-time">${msg.time || ''}</div>
          `;
          // Bubble içindeki tüm linklere target=_blank ekle
          div.querySelectorAll('.chat-msg-bubble a').forEach(a => {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
          });
          chatMessages.insertBefore(div, chatTyping);
        });

        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }

      // ── Ajan değişince sohbet değiş ──
      function switchAgent() {
        const agentId = currentAgentId || 'core';
        loadAgentChat(agentId);
        renderMessages();
      }

      // ── Panel aç/kapa ──
      chatBtn.addEventListener('click', () => {
        const isOpen = chatPanel.classList.toggle('open');
        chatBtn.classList.toggle('active', isOpen);
        if (isOpen) {
          populateAgentSelect();
          selectAgent(currentAgentId);
          switchAgent();
          setTimeout(() => chatInput.focus(), 350);
        }
      });

      chatClose.addEventListener('click', () => {
        chatPanel.classList.remove('open');
        chatBtn.classList.remove('active');
      });

      // ── Yeni Sohbet ──
      chatNewChat.addEventListener('click', () => {
        if (currentMessages.length === 0) return;
        if (!confirm('Bu ajanın sohbet geçmişi silinecek. Emin misin?')) return;
        currentMessages = [];
        saveAgentChat();
        renderMessages();
        chatInput.focus();
      });

      // ── Mesaj gönder (SSE Streaming) ──
      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || isSending) return;

        isSending = true;
        chatSend.disabled = true;
        const model = getSelectedModel();

        // Kullanıcı mesajı
        currentMessages.push({ role: 'user', content: text, time: timeStr() });
        chatInput.value = '';
        chatInput.style.height = 'auto';
        renderMessages();
        saveAgentChat();

        // Boş asistan mesajı oluştur (streaming için)
        currentMessages.push({ role: 'assistant', content: '', time: timeStr() });
        renderMessages();

        // Typing göster
        chatTyping.classList.add('visible');
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Streaming bubble referansı
        const allBubbles = chatMessages.querySelectorAll('.chat-msg.agent .chat-msg-bubble');
        const streamBubble = allBubbles[allBubbles.length - 1];

        try {
          const response = await fetch('/api/sohbet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: text, model: model, agent_id: currentAgentId })
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let fullContent = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); // Son eksik satırı sakla

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.content) {
                    fullContent += parsed.content;
                    if (streamBubble) {
                      streamBubble.innerHTML = fullContent;
                      // Linklere target=_blank ekle
                      streamBubble.querySelectorAll('a').forEach(a => {
                        a.setAttribute('target', '_blank');
                        a.setAttribute('rel', 'noopener noreferrer');
                      });
                    }
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                  }
                } catch(pe) {}
              }
            }
          }

          // Son mesajı güncelle
          currentMessages[currentMessages.length - 1].content = fullContent;
          saveAgentChat();
        } catch(err) {
          currentMessages[currentMessages.length - 1].content = 'Bağlantı hatası: ' + err.message;
        }

        chatTyping.classList.remove('visible');
        renderMessages();
        isSending = false;
        chatSend.disabled = false;
        chatInput.focus();
      }

      chatSend.addEventListener('click', sendMessage);
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Textarea auto-resize
      chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
      });

      // Sayfa yüklendiğinde
      populateAgentSelect();
      selectAgent('core');
      switchAgent();

      // Chat içi linkleri varsayılan tarayıcıda aç (Electron + Browser uyumlu)
      chatMessages.addEventListener('click', (e) => {
        const link = e.target.closest('a[href]');
        if (link && link.href && link.href.startsWith('http')) {
          e.preventDefault();
          e.stopPropagation();
          // Electron ortamında shell.openExternal kullan
          try {
            const { shell } = require('electron');
            shell.openExternal(link.href);
          } catch(err) {
            // Tarayıcıda çalışıyorsa normal aç
            window.open(link.href, '_blank');
          }
        }
      });
    })();
    </script>
</body>
</html>
